# ──────────────────────────────────────────────────────────────────────────────
# CI — Intégration Continue.
# But : à chaque push / PR, prouver que le frontend build, que le backend est
# syntaxiquement sain (Prisma + node --check) et que les images Docker se
# construisent. AUCUN déploiement ici (voir deploy.yml).
# Réf : https://docs.github.com/actions
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  client:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client

  server:
    name: Check backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: node --check src/server.js
        working-directory: server

  docker:
    name: Build images Docker
    runs-on: ubuntu-latest
    needs: [client, server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build image edge
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
