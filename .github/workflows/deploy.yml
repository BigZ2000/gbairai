# ──────────────────────────────────────────────────────────────────────────────
# CD — Déploiement Continu (Option A : 1× EC2 via SSH).
# Déclenché manuellement OU sur push vers `main`. Se connecte au serveur en SSH,
# met à jour le code et relance la stack Docker. Les images sont (re)buildées sur
# l'EC2 (simple pour démarrer). En Option B, on passera à des images poussées
# vers ECR/GHCR par le CI (voir docs/devops/04-github-actions.md).
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   EC2_HOST     IP publique / DNS de l'instance
#   EC2_USER     utilisateur SSH (ex. ubuntu)
#   EC2_SSH_KEY  clé privée SSH (PEM) autorisée sur l'instance
# Réf SSH action : https://github.com/appleboy/ssh-action
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy (prod)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Déploiement SSH
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur l'EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/gbairai
            git pull --ff-only
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
